document.getElementById('startBtn').addEventListener('click', () => {	
    document.getElementById('startScreen').style.display = 'none';
	const canvas = document.getElementById('game');
	const ctx = canvas.getContext('2d'); // Your canvas 2D context

	const spritesheets = {

	//AssetPosition types: 0 = Nouns, 1 = Operators, 2 = Properties, 3 = Particles

		"YOU":		{sheet: spritesheets.text,			col: 251,	row: 226,	color: [3, 20, 21],		type: 2},
		"WIN":		{sheet: spritesheets.text,			col: 251,	row: 1123,	color: [14, 32, 14],	type: 2},
		"PUSH":		{sheet: spritesheets.text,			col: 26,	row: 301,	color: [32, 30, 31],	type: 2},

	const particleData = {

	let currentLevel = "Baba Is You";

	const levelData = {
		"Map": {width: 33, height: 18, objects: []},
		"Baba Is You": {width: 33, height: 18, objects: [
		{ type: "TILE", x: 12, y: 10 },
		{ type: "TILE", x: 13, y: 10 },
		{ type: "TILE", x: 14, y: 10 },
		{ type: "TILE", x: 15, y: 10 },

		{ type: "TILE", x: 16, y: 12 },
		{ type: "TILE", x: 18, y: 12 },
		{ type: "TILE", x: 19, y: 12 },
		{ type: "TILE", x: 20, y: 12 },
		{ type: "TILE", x: 21, y: 12 },
		{ type: "TILE", x: 22, y: 12 },
		{ type: "WALL", x: 12, y: 9	 },
		{ type: "WALL", x: 13, y: 9	 },
		{ type: "WALL", x: 14, y: 9	 },
		{ type: "WALL", x: 15, y: 9	 },
		{ type: "WALL", x: 16, y: 9	 },
		{ type: "WALL", x: 17, y: 9	 },
		{ type: "WALL", x: 18, y: 9	 },

		{ type: "flag", x: 20, y: 7	 },
		{ type: "is",	x: 21, y: 7	 },
		{ type: "win",	x: 22, y: 7	 },
		{ type: "wall", x: 12, y: 15 },
		{ type: "is",	x: 13, y: 15 },
		{ type: "stop", x: 14, y: 15 },
		{ type: "rock", x: 20, y: 15 },
		{ type: "is",	x: 21, y: 15 },

	]}
		// ...add more as needed
	};

	// Colors are taken in top-to-bottom, left-to-right order from spritesheetColors.png
	const palette = [
		"#242424",
		"#737373",
		"#c3c3c3",
		"#ffffff",
		"#080808",
		"#15181f",
		"#293141",

		"#ffbd47",
		"#682e4c",
		"#d9396a",
		"#eb91ca",
		"#294891",
		"#73abf3",
		"#303824",
		"#4b5c1c",
		"#5c8339",
		"#a5b13f",
		"#b6d340",
		"#503f24",
		"#90673e",
		"#c29e46",
		"#362e22",
		"#0b0b0e",
	];

	let gameObjects;

	function initialize() {
		gameObjects = [];
		
		levelData[currentLevel].objects.forEach((obj) => {
		 gameObjects.push({type: obj.type, x: obj.x, y: obj.y})
		})

		gameObjects.forEach((obj) => {
			obj.text = obj.type === obj.type.toLowerCase();
			obj.type = obj.type.toUpperCase();
			obj.active = 0
		
			obj.dir = 0;
			obj.state = 0;
			if (assetPositions[obj.type].sheet === spritesheets.characters) {obj.state = obj.dir * 4;}
		
			obj.frameSeed = Math.floor(Math.random() * 3);
		
			obj.lastx = obj.x;
			obj.lasty = obj.y;
		
			obj.hist = [];
			obj.particles = [];
		});
	}

	initialize();

	const colorizedSpriteCache = {};

	// Colorize a sprite (multiply blend) and cache it
	function getColorizedSprite(asset, frameIndex, spriteState, color, particle = false) { 
		const spriteSize = particle ? particleData[asset.type].size : size;
		const sheet = asset.sheet;
		
		if (!sheet.complete || !sheet.naturalWidth) {
			// Sheet not loaded yet, skip drawing to avoid colored blocks
			return null;
		}
		
		const sheetName = Object.keys(spritesheets).find(key => spritesheets[key] === asset.sheet);
		const cacheKey = asset.type + "_" + frameIndex + "_" + spriteState + "_" + color;

		if (colorizedSpriteCache[cacheKey]) {
			return colorizedSpriteCache[cacheKey];
		}

		// Create offscreen canvas
		const offCanvas = document.createElement('canvas');
		offCanvas.width = spriteSize;
		offCanvas.height = spriteSize;
		const offCtx = offCanvas.getContext('2d');

		// 1. Draw the grayscale sprite
		offCtx.clearRect(0, 0, spriteSize, spriteSize);
		offCtx.drawImage(
			asset.sheet,
			asset.col + (spriteSize + 1) * spriteState, asset.row + (spriteSize + 1) * frameIndex,
			spriteSize, spriteSize,
			0, 0, spriteSize, spriteSize
		);

		// 2. Multiply blend with color
		offCtx.globalCompositeOperation = 'multiply';
		offCtx.fillStyle = color;
		offCtx.fillRect(0, 0, spriteSize, spriteSize);

		// 3. Keep alpha
		offCtx.globalCompositeOperation = 'destination-in';
		offCtx.drawImage(
			asset.sheet,
			asset.col + (spriteSize + 1) * spriteState, asset.row + (spriteSize + 1) * frameIndex,
			spriteSize, spriteSize,
			0, 0, spriteSize, spriteSize
		);

		// Restore
		offCtx.globalCompositeOperation = 'source-over';

		colorizedSpriteCache[cacheKey] = offCanvas;
		return offCanvas;
	}

	//equations
	let eqs = [];

	//transformations
	let tfs = []

	function parseText(lastKey) {
		const text = gameObjects.filter((obj) => (obj.text));
		text.forEach((t) => {t.active = false;});
		eqs = [];
		tfs = [];
		
		const nouns = text.filter((obj) => (assetPositions[obj.type].type === 0));
		const operators = text.filter((obj) => (assetPositions[obj.type].type === 1));
		const properties = text.filter((obj) => (assetPositions[obj.type].type === 2));
		
		nouns.forEach((noun) => {
			if (gameObjects.some((is) => (is.type === "IS" && is.x === noun.x + 1 && is.y === noun.y))) {
				properties.filter((prop) => (prop.x === noun.x + 2 && prop.y === noun.y)).forEach((prop) => {
					noun.active = true;
					prop.active = true;
					operators.forEach((oper) => (oper.active += (oper.type === "IS" && oper.x === noun.x + 1 && oper.y === noun.y)));
					if (!(noun.type in eqs)) {eqs[noun.type] = [];}
					eqs[noun.type].push(prop.type);
				})
				if (lastKey != "z") {
					nouns.filter((tfnoun) => (tfnoun.x === noun.x + 2 && tfnoun.y === noun.y)).forEach((tfnoun) => {
						noun.active = true;
						tfnoun.active = true;
						operators.forEach((oper) => (oper.active += (oper.type === "IS" && oper.x === noun.x + 1 && oper.y === noun.y)));
						if (!(noun.type in tfs)) {tfs[noun.type] = [];}
						tfs[noun.type].push(tfnoun.type);
					})
				}
			}
			if (gameObjects.some((is) => (is.type === "IS" && is.y === noun.y + 1 && is.x === noun.x))) {
				properties.filter((prop) => (prop.y === noun.y + 2 && prop.x === noun.x)).forEach((prop) => {
					noun.active = true;
					prop.active = true;
					operators.forEach((oper) => (oper.active += (oper.type === "IS" && oper.y === noun.y + 1 && oper.x === noun.x)));
					if (!(noun.type in eqs)) {eqs[noun.type] = [];}
					eqs[noun.type].push(prop.type);
				})
				if (lastKey != "z") {
					nouns.filter((tfnoun) => (tfnoun.y === noun.y + 2 && tfnoun.x === noun.x)).forEach((tfnoun) => {
						noun.active = true;
						tfnoun.active = true;
						operators.forEach((oper) => (oper.active += (oper.type === "IS" && oper.y === noun.y + 1 && oper.x === noun.x)));
						if (!(noun.type in tfs)) {tfs[noun.type] = [];}
						tfs[noun.type].push(tfnoun.type);
					})
				}
			}
		});
		for (const [noun, tfnouns] of Object.entries(tfs)) {
			gameObjects.filter((obj) => (!obj.text && obj.type === noun)).forEach((obj) => {
				obj.tf = tfnouns[0];
				if (tfnouns.length > 1)
				{
					for (const tfnoun of tfnouns.slice(1)) {
						gameObjects.push({ type: tfnoun, x: obj.x, y: obj.y, text: false, active: false, dir: 0, state: 0, frameSeed: Math.floor(Math.random() * 3), lastx: obj.x, lasty: obj.y, hist: new Array(moves).fill(0), particles: []});
						if (gameObjects.length > 200) {alert("TOO COMPLEX!")}
					}
				}
			});
		}
		for (const [noun, tfnouns] of Object.entries(tfs)) {
			gameObjects.filter((obj) => (!obj.text && obj.type === noun)).forEach((obj) => {
				obj.type = obj.tf;
			});
		}
	}

	function connectTiles() {
		gameObjects.forEach((obj) => {
			if (assetPositions[obj.type].sheet === spritesheets.tiles) {
				obj.state = 0
				if (gameObjects.some((oth) => (obj.x === levelData[currentLevel].width || (!oth.text && oth.type === obj.type && oth.x === obj.x + 1 && oth.y === obj.y)))) {
					obj.state += 1
				}
				if (gameObjects.some((oth) => (obj.y === 1 || (!oth.text && oth.type === obj.type && oth.y === obj.y - 1 && oth.x === obj.x)))) {
					obj.state += 2
				}
				if (gameObjects.some((oth) => (obj.x === 1 || (!oth.text && oth.type === obj.type && oth.x === obj.x - 1 && oth.y === obj.y)))) {
					obj.state += 4
				}
				if (gameObjects.some((oth) => (obj.y === levelData[currentLevel].height || (!oth.text && oth.type === obj.type && oth.y === obj.y + 1 && oth.x === obj.x)))) {
					obj.state += 8
				}
			} else if (assetPositions[obj.type].sheet === spritesheets.characters) {
				obj.state = ((obj.state) % 4) + (4 * obj.dir)
			} else {obj.state = 0;}
		});
	}

	function checkWin() {
		gameObjects.filter((you) => (is(you, "YOU"))).forEach((you) => {
			if (gameObjects.some((win) => (eqs[you.type].includes("WIN") || win.x === you.x && win.y === you.y && is(win, "WIN")))) {
				for (let i = 0; i < 9; i++) {you.particles.push({type: "ring", x: you.x, y: you.y, dirbypi: 2*Math.random(), time: 1800 + 100 * Math.floor(3*Math.random()), speed: 4 + Math.random(), created: t});}
				levelComplete = true;
				win.play();
			}
		});
	}

	// e.g. is("BABA", "YOU")
	function is(noun, property) {
		return (!noun.text && noun.type in eqs && eqs[noun.type].includes(property)) || (property === "PUSH" && noun.text);
	}

	function drawAsset(ctx, assetName, x, y, frameIndex = 0, spriteState = 0, color, particle = false) {
		const asset = assetPositions[assetName];
		const unitX = canvas.width / levelData[currentLevel].width
		const unitY = canvas.height / levelData[currentLevel].height
		
		const colorized = getColorizedSprite(
				{...asset, type: assetName}, // asset, with type info
				frameIndex,
				spriteState,
				color,
				particle
		);
		if (particle) {
			let xshift = particleData[assetName].xshift;
			let yshift = particleData[assetName].yshift;
			ctx.drawImage(
				colorized,
				0, 0, particleData[assetName].size, particleData[assetName].size,
				(x - 1 + xshift) * unitX, (y - 1 + yshift) * unitY,
				unitX * (particleData[assetName].size / size), unitY * (particleData[assetName].size / size)
			);
		} else {
			ctx.drawImage(
				colorized,
				0, 0, size, size,
				(x - 1) * unitX, (y - 1) * unitY,
				unitX, unitY
			);
		}
	}

	var everythingLoaded = false

	function loadSpritesheets(callback) {
		if (everythingLoaded === true) {
			callback();
		} else {
			let loaded = 0
			const total = Object.keys(spritesheets).length;
			for (const key in spritesheets) {
				spritesheets[key].onload = () => {
					loaded++;
					if (loaded === total) 
						everythingLoaded = true;
						callback();
				};
			}
		}
	}

	function drawScene() {
		ctx.fillStyle = "#080808";
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		
		let realProg = 1;
		if (animatingS) {
			realProg = (prog / animationSpeedS);
			realProg = 1 - (1 - realProg) * (1 - realProg);
		}
		
		// Draw each game object and particle
		for (const obj of gameObjects) {
			drawAsset(
				ctx, obj.type,
				(obj.x * realProg) + (obj.lastx * (1 - realProg)),
				(obj.y * realProg) + (obj.lasty * (1 - realProg)),
				(animationFrame + obj.frameSeed) % 3,
				obj.text ? -1 : obj.state,
				palette[assetPositions[obj.type].color[obj.text + obj.active]]);
			
			obj.particles.filter((part) => (t - part.created >= part.time)).forEach((part) => {obj.particles.splice(obj.particles.indexOf(part), 1);})
			obj.particles.forEach((part) => {
				let speed = part.speed;
				let partProg = (t - part.created) / part.time
				let partState; 
				if (particleData[part.type].smooth) {
					const partAnimationSpeed = 100
					partState = part.time/partAnimationSpeed - Math.floor((part.time/partAnimationSpeed + 1)*partProg);
					if (partState > 3) {
						partState = 4 + ((partState - 3) % 3)
					}
					partProg = 1 - (1 - partProg) * (1 - partProg);
				} else {
					partState = 5 - Math.floor(6*partProg);
				}
				
				drawAsset(
					ctx, part.type,
					part.x + partProg * speed * (Math.cos(Math.PI*part.dirbypi)),
					part.y - partProg * speed * (Math.sin(Math.PI*part.dirbypi)),
					0, 
					partState,
					palette[particleData[part.type].gold ? 14 : assetPositions[obj.type].color[obj.text + obj.active]],
					true);
			})
		}
		bgm.volume = ((+you * realProg) + (+lastyou * (1 - realProg))) * bgmVol;
	}

	let animationStarted = false;
	// Function to resize canvas to window size
	function resizeCanvas() {
		marginSize = 88
		aspectRatio = levelData[currentLevel].width / levelData[currentLevel].height
		canvas.height = ((window.innerHeight - marginSize) * aspectRatio > window.innerWidth - marginSize) ? (window.innerWidth - marginSize) / aspectRatio: window.innerHeight - marginSize;
		canvas.width = canvas.height * aspectRatio;
		if (window.innerHeight < marginSize)
			canvas.height = ((window.innerHeight) * aspectRatio > window.innerWidth) ? (window.innerWidth) / aspectRatio: window.innerHeight;
			canvas.width = canvas.height * aspectRatio;
		loadSpritesheets(() => {
			ctx.imageSmoothingEnabled = false;
			drawScene();
			if (!animationStarted) {
				animationStarted = true;
				requestAnimationFrame(animate);
			}
		});
	}

	const animationSpeed = 150; // ms per frame
	let animationFrame = 0;
	let lastFrameTime = 0;

	const animationSpeedS = 100;
	let animatingS = false;
	let lastFrameTimeS = 0;
	let prog = 0;
	let t = 0;

	const maxSparkleInterval = 1500
	let sparkleTime = maxSparkleInterval * Math.random();
	let lastSparkleTime = 0
	let sparkle = false;

	let levelTransitionProg = 0;
	let transitioning = true;
	let levelTransitionTime = 0;
	const phase1Duration = 2000;
	const phase2Duration = 1000;
	
	let you = true;
	let lastyou = true;

	function animate(time) {
		sparkle = false;
		if (time - lastSparkleTime > sparkleTime) {
			lastSparkleTime = time;
			sparkleTime = maxSparkleInterval * Math.random();
			sparkle = true;
		}
		if (sparkle && !levelComplete) {gameObjects.filter((obj) => (is(obj, "WIN"))).forEach((obj) => {obj.particles.push({type: "sparkle", x: obj.x, y: obj.y, dirbypi: 2*Math.random(), time: 900, speed: 1.5, created: t});});}
		
		if (time - lastFrameTime > animationSpeed) {
			animationFrame++;
			lastFrameTime = time;
		}
		
		if (levelComplete && !transitioning) {
			transitioning = true;
			levelTransitionTime = time;
		}
		
		if (animatingS) {
			if (time - lastFrameTimeS > animationSpeedS) {
				animatingS = false;
			}
		} else {
			lastFrameTimeS = time
		}
		prog = time - lastFrameTimeS;
		t = time;
		
		drawScene();
		if (transitioning) {
			levelTransitionProg = time - levelTransitionTime;
			if (levelComplete) {levelTransitionProg -= phase1Duration;}
			realProg = levelTransitionProg / phase2Duration;
			if (realProg >= 0) {
				let next = false;
				if (realProg > 1) {
					if (levelComplete) {next = true; realProg = 1; bgm.volume = 0;} else {transitioning = false; bgm.volume = bgmVol; requestAnimationFrame(animate); return;}
				}
			
				const width = levelData[currentLevel].width;
				const height = levelData[currentLevel].height;
				
				const unit = canvas.width / width;
			
				const centerx = unit * width / 2;
				const centery = unit * height / 2;
			
				const radius = unit * (2 + Math.hypot(width, height) / 2); 
				
				const angles = [0.1,	0.15,	0.2,	0.25,	0.3,	0.35,	0.4,	0.45,	0.5	]
				const xradii = [1.5,	1,		1,		1.5,	2.5,	2.5,	2.5,	3,		4  	]
				const yradii = [2,		1.5,	1.5,	1.5,	1.5,	2,		1.5,	1,		2	]
				
				if (!levelComplete) {realProg = 1 - realProg;}
				
				bgm.volume = (1 - realProg) * bgmVol;
				
				ctx.save();
				ctx.beginPath();
				ctx.rect(0, 0, canvas.width, canvas.height);
				ctx.ellipse(centerx, centery, (1 - realProg) * radius * width / height, (1 - realProg) * radius * height / width, 0, 0, 2 * Math.PI);
				ctx.fillStyle = "#15181f";
				ctx.fill("evenodd");
				ctx.restore();
			
				for (i = 0; i < angles.length; i++) {
					const x = radius * Math.cos(Math.PI * angles[i]) * (width / height)
					const y = radius * Math.sin(Math.PI * angles[i]) * (height / width)
					
					ctx.fillStyle = "#15181f";
					
					ctx.beginPath();
					ctx.ellipse((centerx + x) * (1 - realProg) + centerx * realProg, (centery + y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
					ctx.fill();
					ctx.beginPath();
					ctx.ellipse((centerx + x) * (1 - realProg) + centerx * realProg, (centery - y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
					ctx.fill();
					if (angles[i] != 0.5) {
						ctx.beginPath();
						ctx.ellipse((centerx - x) * (1 - realProg) + centerx * realProg, (centery + y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
						ctx.fill();
						ctx.beginPath();
						ctx.ellipse((centerx - x) * (1 - realProg) + centerx * realProg, (centery - y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
						ctx.fill();
					}
				}
				if (next) {
					currentLevel = "Map";
					levelComplete = false; 
					levelTransitionTime = time;
					moves = 0;
					initialize();
					
					parseText();
					connectTiles();
				}
			}
		}
		requestAnimationFrame(animate);
	}

	let levelComplete = false;
	let moves = 0;

	parseText();
	// Initial tile connection
	connectTiles();
	// Initial resize
	resizeCanvas();

	// Listen for window resize
	window.addEventListener('resize', resizeCanvas);

	window.addEventListener('keydown', function(event) {
	    lastyou = you;
		if (prog != 0 || levelComplete) return; // Ignore auto-repeats and when animating smooth movement
		gameObjects.forEach((obj) => {
			obj.lastx = obj.x;
			obj.lasty = obj.y;
			if (event.key.startsWith("Arrow") && gameObjects.some((obj) => is(obj, "YOU"))) {
				obj.hist.push({type: obj.type, x: obj.x, y: obj.y, dir: obj.dir, state: obj.state});
			}
		})
		if (event.key.startsWith("Arrow") && gameObjects.some((obj) => is(obj, "YOU"))) {moves++;}
		for (const obj of gameObjects) {
			if (event.key.startsWith("Arrow") && is(obj, "YOU")) {
				let collDetect = true;
				let stillPushing = true;
				let canMove = true;
				let collx = obj.x;
				let colly = obj.y;
				let pushObjs = [];
				while (collDetect) {
				collDetect = false;
				stillPushing = false;
					switch(event.key) {
						case 'ArrowRight': collx += 1; break;
						case 'ArrowUp':		colly -= 1; break;
						case 'ArrowLeft':	collx -= 1; break;
						case 'ArrowDown':	colly += 1; break;
					}
					if (gameObjects.some((stop) => (stop.x === collx && stop.y === colly && is(stop, "STOP") && !is(stop, "YOU"))) || collx < 1 || colly < 1 || collx > levelData[currentLevel].width || colly > levelData[currentLevel].height) {canMove = false; break;}
					gameObjects.filter((push) => (push.x === collx && push.y === colly && is(push, "PUSH") && !is(push, "YOU"))).forEach((push) => {pushObjs.push(push); collDetect = true; stillPushing = true;})
					gameObjects.filter((push) => (push.x === collx && push.y === colly && is(push, "YOU"))).forEach((push) => {collDetect = true;})
				}
				
				switch(event.key) {
					case 'ArrowRight': {obj.dir = 0;} break;
					case 'ArrowUp':		{obj.dir = 1;} break;
					case 'ArrowLeft':	{obj.dir = 2;} break;
					case 'ArrowDown':	{obj.dir = 3;} break;
				}
				if (canMove) {
					walk.play();
					pushObjs.forEach((pushObj) => {
						pushObj.particles.push({type: "dust", x: pushObj.x, y: pushObj.y, dirbypi: (1 + (obj.dir * 0.5) % 2), time: 900, speed: 0.5, created: t});
						switch(event.key) {
							case 'ArrowRight': pushObj.x += 1; pushObj.dir = 0; break;
							case 'ArrowUp':		pushObj.y -= 1; pushObj.dir = 1; break;
							case 'ArrowLeft':	pushObj.x -= 1; pushObj.dir = 2; break;
							case 'ArrowDown':	pushObj.y += 1; pushObj.dir = 3; break;
						}
						if (assetPositions[pushObj.type].sheet === spritesheets.characters) {pushObj.state = ((pushObj.state) % 4) + (4 * pushObj.dir);}
					})
					obj.particles.push({type: "dust", x: obj.x, y: obj.y, dirbypi: (1 + (obj.dir * 0.5) % 2), time: 900, speed: 0.5, created: t});
					switch(event.key) {
						case 'ArrowRight': {obj.x += 1;} break;
						case 'ArrowUp':		{obj.y -= 1;} break;
						case 'ArrowLeft':	{obj.x -= 1;} break;
						case 'ArrowDown':	{obj.y += 1;} break;
					}
				}
				animatingS = true;
				if (assetPositions[obj.type].sheet === spritesheets.characters) {obj.state = ((obj.state + 1) % 4) + (4 * obj.dir);}
			}
		}
		if (event.key === "z" && moves > 0) {
			for (const obj of gameObjects) {
				last = obj.hist.pop();
				if (last === 0) {
					gameObjects.splice(gameObjects.indexOf(obj), 1);
				}			
				obj.type = last.type;
				obj.x = last.x;
				obj.y = last.y;
				obj.dir = last.dir;
				obj.state = last.state;
			}
			animatingS = true;
			moves--;
		}
		parseText();
		connectTiles();
		checkWin();
		you = gameObjects.some((obj) => (is(obj, "YOU")));
	});
});
</script>
