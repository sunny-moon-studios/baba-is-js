const sfxGain = audioCtx.createGain();      // For sound effects
let musicSource = null;

musicGain.connect(audioCtx.destination);
sfxGain.connect(audioCtx.destination);

const soundBuffers = {};

// Load and decode an audio file
function loadSound(name, url) {
	return fetch(url)
		.then(res => {return res.arrayBuffer();})
		.then(data => audioCtx.decodeAudioData(data))
		.then(buffer => {soundBuffers[name] = buffer;})
}

// Play a sound by name
function playMusic(name) {
	// Stop previous music if playing
    if (musicSource) {
        musicSource.stop();
        musicSource.disconnect();
    }
    // Create and start new source
    musicSource = audioCtx.createBufferSource();
    musicSource.buffer = soundBuffers[name];
    musicSource.loop = true;
    musicSource.connect(musicGain);
    musicSource.start(0); // Start from beginning
}

// Play a sound by name
function playSFX(name, volume = 1.0, loop = false) {
	const sfxSource = audioCtx.createBufferSource();
    sfxSource.buffer = soundBuffers[name];
	sfxSource.loop = loop;

    // Create a gain node for this specific SFX
    const sfxVolume = audioCtx.createGain();
    sfxVolume.gain.value = volume; // 0.0 = silent, 1.0 = full volume

    // Connect: source → gain → destination
    sfxSource.connect(sfxVolume);
    sfxVolume.connect(audioCtx.destination);

    sfxSource.start();
	return sfxSource;
}

	// Colorize a sprite (multiply blend) and cache it
	function getColorizedSprite(asset, frameIndex, spriteState, color, particle = false) { 
		const sheet = asset.sheet;
		if (!sheet.complete || !sheet.naturalWidth) {
			// Sheet not loaded yet, skip drawing to avoid colored blocks
			return null;
		}
		
		const cacheKey = asset.type + "_" + frameIndex + "_" + spriteState + "_" + color;
		if (colorizedSpriteCache[cacheKey]) {
			return colorizedSpriteCache[cacheKey];
		}
		
		const sheetName = Object.keys(spritesheets).find(key => spritesheets[key] === asset.sheet);
		
		const cursor = asset.type === "CURSOR";
		const spriteSize = particle ? particleData[asset.type].size : (cursor ? cursorSize : size);

		// Create offscreen canvas
		const offCanvas = document.createElement('canvas');
		offCanvas.width = spriteSize;
		offCanvas.height = spriteSize;
		const offCtx = offCanvas.getContext('2d');
		
		if (cursor) {spriteState = frameIndex; frameIndex = 0;}
		// 1. Draw the grayscale sprite
		offCtx.clearRect(0, 0, spriteSize, spriteSize);
		offCtx.drawImage(
			asset.sheet,
			asset.col + (spriteSize + 1) * spriteState, asset.row + (spriteSize + 1) * frameIndex,
			spriteSize, spriteSize,
			0, 0, spriteSize, spriteSize
		);

		// 2. Multiply blend with color
		offCtx.globalCompositeOperation = 'multiply';
		offCtx.fillStyle = color;
		offCtx.fillRect(0, 0, spriteSize, spriteSize);

		// 3. Keep alpha
		offCtx.globalCompositeOperation = 'destination-in';
		offCtx.drawImage(
			asset.sheet,
			asset.col + (spriteSize + 1) * spriteState, asset.row + (spriteSize + 1) * frameIndex,
			spriteSize, spriteSize,
			0, 0, spriteSize, spriteSize
		);

		// Restore
		offCtx.globalCompositeOperation = 'source-over';

		colorizedSpriteCache[cacheKey] = offCanvas;
		return offCanvas;
	}

	function parseText(tfEnabled = true) {
		const text = gameObjects.filter((obj) => (obj.text));
		text.forEach((t) => {t.active = false;});
		eqs = [];
		tfs = [];
		
		sntns = [];
		
		const nouns = text.filter((obj) => (assetPositions[obj.type].type === 0));
		const operators = text.filter((obj) => (assetPositions[obj.type].type === 1));
		const properties = text.filter((obj) => (assetPositions[obj.type].type === 2));
		
		nouns.forEach((noun) => {
			if (gameObjects.some((is) => (is.type === "IS" && is.x === noun.x + 1 && is.y === noun.y))) {
				properties.filter((prop) => (prop.x === noun.x + 2 && prop.y === noun.y)).forEach((prop) => {
					noun.active = true;
					prop.active = true;
					operators.forEach((oper) => {oper.active = (oper.active || (oper.type === "IS" && oper.x === noun.x + 1 && oper.y === noun.y));});	
					sntns.push({ startx: noun.x, starty: noun.y, endx: noun.x + 2, endy: noun.y, subjs: [noun.type], preds: [prop.type]});
				})
				nouns.filter((tfnoun) => (tfnoun.x === noun.x + 2 && tfnoun.y === noun.y)).forEach((tfnoun) => {
					noun.active = true;
					tfnoun.active = true;
					operators.forEach((oper) => {oper.active = (oper.active || (oper.type === "IS" && oper.x === noun.x + 1 && oper.y === noun.y));});	
					if (tfEnabled) {
						sntns.push({ startx: noun.x, starty: noun.y, endx: noun.x + 2, endy: noun.y, subjs: [noun.type], preds: [tfnoun.type]});
					}
				});
			}
			if (gameObjects.some((is) => (is.type === "IS" && is.y === noun.y + 1 && is.x === noun.x))) {
				properties.filter((prop) => (prop.y === noun.y + 2 && prop.x === noun.x)).forEach((prop) => {
					noun.active = true;
					prop.active = true;
					operators.forEach((oper) => {oper.active = (oper.active || (oper.type === "IS" && oper.y === noun.y + 1 && oper.x === noun.x));});
					sntns.push({ startx: noun.x, starty: noun.y, endx: noun.x, endy: noun.y + 2, subjs: [noun.type], preds: [prop.type]});
				})
				nouns.filter((tfnoun) => (tfnoun.y === noun.y + 2 && tfnoun.x === noun.x)).forEach((tfnoun) => {
					noun.active = true;
					tfnoun.active = true;
					operators.forEach((oper) => {oper.active = (oper.active || (oper.type === "IS" && oper.y === noun.y + 1 && oper.x === noun.x));});
					if (tfEnabled) {
						sntns.push({ startx: noun.x, starty: noun.y, endx: noun.x, endy: noun.y + 2, subjs: [noun.type], preds: [tfnoun.type]});
					}
				});
			}
		});
		
		
		let parseAnds = true;
		while (parseAnds) {
			parseAnds = false
			let ands = operators.filter((and) => (and.type === "AND" && !and.active));
			if (ands.length === 0) { break; }
			ands.forEach((and) => {
				sntns.forEach((sntn) => {
					if (sntn.starty === sntn.endy) {
						if (sntn.startx === and.x + 1 && sntn.starty === and.y) {
							nouns.filter((noun) => (noun.x === and.x - 1 && noun.y === and.y)).forEach((noun) => {
								parseAnds = true;
								noun.active = true;
								and.active = true;
								sntn.subjs.push(noun.type);
							});
						} else if (sntn.endx === and.x - 1 && sntn.endy === and.y) {
							properties.filter((prop) => (prop.x === and.x + 1 && prop.y === and.y)).forEach((prop) => {
								parseAnds = true;
								prop.active = true;
								and.active = true;
								sntn.preds.push(prop.type);
							});
							nouns.filter((noun) => (noun.x === and.x + 1 && noun.y === and.y)).forEach((noun) => {
								parseAnds = true;
								noun.active = true;
								and.active = true;
								sntn.preds.push(noun.type);
							});
						}
					}
					if (sntn.startx === sntn.endx) {
						if (sntn.starty === and.y + 1 && sntn.startx === and.x) {
							nouns.filter((noun) => (noun.y === and.y - 1 && noun.x === and.x)).forEach((noun) => {
								parseAnds = true;
								noun.active = true;
								and.active = true;
								sntn.subjs.push(noun.type);
							});
						} else if (sntn.endy === and.y - 1 && sntn.endx === and.x) {
							properties.filter((prop) => (prop.y === and.y + 1 && prop.x === and.x)).forEach((prop) => {
								parseAnds = true;
								prop.active = true;
								and.active = true;
								sntn.preds.push(prop.type);
							});
							nouns.filter((noun) => (noun.y === and.y + 1 && noun.x === and.x)).forEach((noun) => {
								parseAnds = true;
								noun.active = true;
								and.active = true;
								sntn.preds.push(noun.type);
							});
						}
					}
					
				});
			});
		}
		
		sntns.forEach((sntn) => {
			sntn.subjs.forEach((subj) => {
				sntn.preds.forEach((pred) => {
					if (assetPositions[pred].type === 0) {
						if (!(subj in tfs)) {tfs[subj] = [];}
						tfs[subj].push(pred);
					} else {
						if (!(subj in eqs)) {eqs[subj] = [];}
						eqs[subj].push(pred);
					}
				});
			});
		});
		
		for (const [noun, tfnouns] of Object.entries(tfs)) {
			gameObjects.filter((obj) => (!obj.text && obj.type === noun)).forEach((obj) => {
				if (!tfs[noun].includes(noun)) {
					obj.tf = tfnouns[0];
					if (tfnouns.length > 1) {
						for (const tfnoun of tfnouns.slice(1)) {
							gameObjects.push({ type: tfnoun, x: obj.x, y: obj.y, text: false, active: false, dir: 0, state: 0, frameSeed: Math.floor(Math.random() * 3), lastx: obj.x, lasty: obj.y, hist: new Array(moves).fill(0)});
							if (gameObjects.length > 200) {alert("TOO COMPLEX!")}
						}
					}
				} else {
					obj.tf = obj.type;
				}
			});
		}
		for (const [noun, tfnouns] of Object.entries(tfs)) {
			gameObjects.filter((obj) => (!obj.text && obj.type === noun)).forEach((obj) => {
				obj.type = obj.tf;
			});
		}
	}

	function connectTiles() {
		gameObjects.forEach((obj) => {
			if (assetPositions[obj.type].sheet === spritesheets.tiles) {
				obj.state = 0;
				if (obj.x === levelWidth || gameObjects.some((oth) => (!oth.text && (oth.type === obj.type || oth.type === "LEVEL") && oth.x === obj.x + 1 && oth.y === obj.y))) {
					obj.state += 1;
				}
				if (obj.y === 1 || gameObjects.some((oth) => (!oth.text && (oth.type === obj.type || oth.type === "LEVEL") && oth.y === obj.y - 1 && oth.x === obj.x))) {
					obj.state += 2;
				}
				if (obj.x === 1 || gameObjects.some((oth) => (!oth.text && (oth.type === obj.type || oth.type === "LEVEL") && oth.x === obj.x - 1 && oth.y === obj.y))) {
					obj.state += 4;
				}
				if (obj.y === levelHeight || gameObjects.some((oth) => (!oth.text && (oth.type === obj.type || oth.type === "LEVEL") && oth.y === obj.y + 1 && oth.x === obj.x))) {
					obj.state += 8;
				}
			} else if (assetPositions[obj.type].sheet === spritesheets.characters) {
				obj.state = ((obj.state) % 4) + (4 * obj.dir);
			} else if (assetPositions[obj.type].sheet === spritesheets.others) {
				if (animatedSprites.includes(obj.type)) {
					obj.state = (obj.state + 1) % 4;
				} else {
					obj.state = obj.dir;
				}
			} else {obj.state = obj.type === "LEVEL" && gameProgress.includes(obj.name) ? -1 : 0;}
		});
	}

	function checkWin() {
		gameObjects.filter((you) => (is(you, "YOU"))).forEach((you) => {
			if (gameObjects.some((win) => (eqs[you.type].includes("WIN") || win.x === you.x && win.y === you.y && is(win, "WIN") && is(you, "FLOAT") === is(win, "FLOAT")))) {
				for (let i = 0; i < 9; i++) {particles.push({type: "ring", x: you.x, y: you.y, dirbypi: 2*Math.random(), time: 1800 + 100 * Math.floor(3*Math.random()), speed: 4 + Math.random(), created: t, color: 14, xshift: 0, yshift: 0});}
				levelComplete = true;
				exit = false;
				nextLevel = currentWorld;
			}
		});
		if (levelComplete && !exit) {if (Worlds.includes(currentLevel)) {playSFX('level enter');} else {playSFX('win');}}
	}

	// e.g. is("BABA", "YOU")
	function is(noun, property) {
		return (!noun.text && noun.type in eqs && eqs[noun.type].includes(property)) || (property === "PUSH" && noun.text);
	}
	
	function del(obj) {
		gameObjects.splice(gameObjects.indexOf(obj), 1);
		inactives[inactives.length - 1].push(obj);
	}

	function drawAsset(ctx, assetName, x, y, frameIndex = 0, spriteState = 0, color, particle = false) {
		const asset = assetPositions[assetName];
		const unitX = canvas.width / levelWidth
		const unitY = canvas.height / levelHeight
		
		const colorized = getColorizedSprite(
				{...asset, type: assetName}, // asset, with type info
				frameIndex,
				spriteState,
				color,
				particle
		);
		if (particle) {
			let xshift = particleData[assetName].xshift;
			let yshift = particleData[assetName].yshift;
			ctx.drawImage(
				colorized,
				0, 0, particleData[assetName].size, particleData[assetName].size,
				(x - 1 + xshift) * unitX, (y - 1 + yshift) * unitY,
				unitX * (particleData[assetName].size / size), unitY * (particleData[assetName].size / size)
			);
		} else {
			if (assetName === "CURSOR") {
				ctx.drawImage(
					colorized,
					0, 0, cursorSize, cursorSize,
					(x - 1 - (cursorSize / size - 1) / 2) * unitX, (y - 1  - (cursorSize / size - 1) / 2) * unitY,
					unitX * cursorSize / size, unitY * cursorSize / size
				);
			} else {
				ctx.drawImage(
					colorized,
					0, 0, size, size,
					(x - 1) * unitX, (y - 1) * unitY,
					unitX, unitY
				);
			}
		}
	}

	var everythingLoaded = false

	function loadSpritesheets(callback) {
		if (everythingLoaded === true) {
			callback();
			return;
		}
		let loaded = 0;
		const total = Object.keys(spritesheets).length;
		if (total === 0) {
			everythingLoaded = true;
			callback();
			return;
		}
		for (const key in spritesheets) {
			const img = spritesheets[key];
			// If the image is already loaded (from cache), count it immediately
			if (img.complete) {
				loaded++;
				if (loaded === total) {
					everythingLoaded = true;
					callback();
				}
			} else {
				img.onload = () => {
					loaded++;
					if (loaded === total) {
						everythingLoaded = true;
						callback();
					}
				};
			}
		}
	}

	function drawScene() {
		const unitX = canvas.width / levelWidth
		const unitY = canvas.height / levelHeight
		ctx.imageSmoothingEnabled = false;
		if (currentLevel === "Map") {
			const xLocation = 31;
			const yLocation = 496;
			const frameDiff = 854
			ctx.drawImage(
				spritesheets.map,
				xLocation + frameDiff*(animationFrame % 3), yLocation, levelWidth*size, levelHeight*size,
				0, 0,
				canvas.width, canvas.height
			);
		} else {
			ctx.fillStyle = bgColor;
			ctx.fillRect(0, 0, canvas.width, canvas.height);
		}
		
		let realProg = 1;
		let linProg = 1;
		if (animatingS) {
			realProg = (prog / animationSpeedS);
			linProg = realProg
			realProg = 1 - (1 - realProg) * (1 - realProg);
		}
		
		// Draw each game object and particle
		for (const obj of gameObjects) {
			if (obj.type != "LEVEL" || (obj.type === "LEVEL" && obj.levelState > 0)) {
				const cursor = obj.type === "CURSOR";
				drawAsset(
					ctx, obj.type,
					(obj.x * (cursor ? linProg : realProg)) + (obj.lastx * (1 - (cursor ? linProg : realProg))),
					(obj.y * (cursor ? linProg : realProg)) + (obj.lasty * (1 - (cursor ? linProg : realProg))),
					(animationFrame + obj.frameSeed) % 3,
					obj.text ? -1 : obj.state,
					obj.type === "LEVEL" ? palette[obj.color] : palette[is(obj, "RED") ? 12 : is(obj, "BLUE") ? 18 : assetPositions[obj.type].color[obj.text + obj.active]]);
				if (obj.type === "LEVEL" && obj.levelState > 1) {
					const unitX = canvas.width / levelWidth
					const unitY = canvas.height / levelHeight
					if (gameProgress.includes(obj.name)) {ctx.globalAlpha = 0.2;}
					if (obj.icon in levelIcons) {
						let iconNum = levelIcons[obj.icon];
						ctx.drawImage(
							spritesheets.statics,
							751 + (size + 1)*(iconNum % 5), 910 + (size + 1)*(iconNum - (iconNum % 5))/5, size, size,
							(obj.x - 1) * unitX, (obj.y - 1) * unitY,
							unitX, unitY
						);
					} else if (!(obj.icon === "")){
						ctx.drawImage(
							spritesheets.statics,
							671 + parseInt(obj.icon[0]) * 8, 985, 7, 16,
							(obj.x - 1 + 5/size) * unitX, (obj.y - 1 + 4/size) * unitY,
							7 * (unitX / size), 16 * (unitY / size)
						);
						ctx.drawImage(
							spritesheets.statics,
							671 + parseInt(obj.icon[1]) * 8, 985, 7, 16,
							(obj.x - 1 + 13/size) * unitX, (obj.y - 1 + 4/size) * unitY,
							7 * (unitX / size), 16 * (unitY / size)
						);
					}
					ctx.globalAlpha = 1.0;
				}
			}
		}
		particles.filter((part) => (t - part.created >= part.time)).forEach((part) => {particles.splice(particles.indexOf(part), 1);})
		particles.forEach((part) => {
			let speed = part.speed;
			let partProg = (t - part.created) / part.time
			let partState; 
			if (particleData[part.type].smooth) {
				const partAnimationSpeed = 100
				partState = part.time/partAnimationSpeed - Math.floor((part.time/partAnimationSpeed + 1)*partProg);
				if (partState > 3) {
					partState = 4 + ((partState - 3) % 3)
				}
				partProg = 1 - (1 - partProg) * (1 - partProg);
			} else {
				partState = 5 - Math.floor(6*partProg);
				if (part.type === "drops") {
					partState = 3 - Math.floor(4*partProg);
				}
			}
			
			drawAsset(
				ctx, part.type,
				part.x + partProg * speed * (Math.cos(Math.PI*part.dirbypi)) + part.xshift,
				part.y - partProg * speed * (Math.sin(Math.PI*part.dirbypi)) + part.yshift,
				0, 
				partState,
				palette[part.color],
				true);
			if (part.type == "steam") {
			}
		})
	}

	let animationStarted = false;
	// Function to resize canvas to window size
	function resizeCanvas(draw = true) {
		marginSize = 88
		aspectRatio = levelWidth / levelHeight
		canvas.height = ((window.innerHeight - marginSize) * aspectRatio > window.innerWidth - marginSize) ? (window.innerWidth - marginSize) / aspectRatio: window.innerHeight - marginSize;
		canvas.width = canvas.height * aspectRatio;
		if (window.innerHeight < marginSize) {
			canvas.height = ((window.innerHeight) * aspectRatio > window.innerWidth) ? (window.innerWidth) / aspectRatio: window.innerHeight;
			canvas.width = canvas.height * aspectRatio;
		}
		if (draw) {
			loadSpritesheets(() => {
				drawScene();
				if (!animationStarted) {
					animationStarted = true;
					requestAnimationFrame(animate);
				}
			});
		}
	}

	const animationSpeed = 150; // ms per frame
	let animationFrame = 0;
	let lastFrameTime = 0;

	const animationSpeedS = 100;
	let animatingS = false;
	let lastFrameTimeS = 0;
	let prog = 0;
	let t = 0;

	const maxSparkleInterval = 1500
	let sparkleTime = maxSparkleInterval * Math.random();
	let lastSparkleTime = 0
	let sparkle = false;

	let levelTransitionProg = 0;
	let transitioning = true;
	let transitionDelay = false;
	let levelTransitionTime = 0;
	const phase1Duration = 2000;
	const phase2Duration = 1000;
	let cloudColor = "";
	
	const buildingLevelDelay = 1500;
	const buildingLevelSpeed = 150;
	let buildingLevel = false;
	let buildingLevelWait = buildingLevelDelay;
	let buildingLevelTime = 0;
	let currentBuilds = [];

	let hotCountdowns = [];
	
	let you = true;
	let lastyou = true;
	
	function modifyMap(x, y, newLevel = false) {
		let level = gameObjects.find((lvl) => (lvl.type === "LEVEL" && lvl.x === x && lvl.y === y))
		if (level) {
			level.levelState = 2;
			if (level.name != "Map" && (!gameProgress.includes(level.name) || (level.name === lastLevel && !newLevel))) return;
		} else {
			if (!gameObjects.find((lin) => (lin.type === "LINE" && lin.x === x && lin.y === y))) {
				gameObjects.push({ type: (currentWorld === "Map" && x === 15 && y === 14) ? "GATE" : "LINE", x: x, y: y, text: false, active: false, dir: 0, state: 0, frameSeed: Math.floor(Math.random() * 3), lastx: x, lasty: y, hist: new Array(moves).fill(0)});
			}
		}
		if (path.find((pth) => (pth.x === x + 1 && pth.y === y)) && !revealed.find((rvd) => (rvd.x === x + 1 && rvd.y === y)) && !buildLocs.find((loc) => (loc.x === x + 1 && loc.y === y))) {buildLocs.push({x: x+1, y: y})}
		if (path.find((pth) => (pth.x === x && pth.y === y - 1)) && !revealed.find((rvd) => (rvd.x === x && rvd.y === y - 1)) && !buildLocs.find((loc) => (loc.x === x && loc.y === y - 1))) {buildLocs.push({x: x, y: y-1})}
		if (path.find((pth) => (pth.x === x - 1 && pth.y === y)) && !revealed.find((rvd) => (rvd.x === x - 1 && rvd.y === y)) && !buildLocs.find((loc) => (loc.x === x - 1 && loc.y === y))) {buildLocs.push({x: x-1, y: y})}
		if (path.find((pth) => (pth.x === x && pth.y === y + 1)) && !revealed.find((rvd) => (rvd.x === x && rvd.y === y + 1)) && !buildLocs.find((loc) => (loc.x === x && loc.y === y + 1))) {buildLocs.push({x: x, y: y+1})}
	}

	function animate(time) {
		if (lastLevelComplete && !levelComplete) {
			resizeCanvas(false);
			if (Worlds.includes(currentLevel)) {
				if (!Worlds.includes(lastLevel) && !exit) {
					let normalVictory = false;
					if (currentLevel in worldNumbers) {
						if (worldNumbers[currentLevel][0] === gameProgress.length) {
							playSFX('area clear');
						} else if (worldNumbers[currentLevel][1] === gameProgress.length) {
							playSFX('area complete');
						} else {
							normalVictory = true;
						}
					} else {
						normalVictory = true;
					}
					if (normalVictory) {playSFX('level complete');}
				}
			}
		}
		
		if (newLevel && levelReady && Worlds.includes(currentLevel)) {
			newLevel = false;
			while (buildLocs.length > 0) {
				buildLocs.filter((loc) => loc && typeof loc.x === "number" && typeof loc.y === "number").forEach((loc) => {if (currentWorld != "Map" || loc.x != 15 || loc.y != 14) {revealed.push({x: loc.x, y: loc.y});}})
				let buildingLocs = buildLocs.filter((loc) => loc && typeof loc.x === "number" && typeof loc.y === "number");
				buildLocs = [];
				buildingLocs.forEach((loc) => {
					modifyMap(loc.x, loc.y);
				});
				connectTiles();
			}
			lastLevelCoords = gameObjects.find((obj) => (obj.type === "LEVEL" && obj.name === lastLevel));
			if (!lastLevelCoords || typeof lastLevelCoords.x !== "number" || typeof lastLevelCoords.y !== "number") {
				console.log("gunky");
				// UPDATE BEFORE COMMITING
				buildLocs = [];
				buildingLevel = false;
				buildingLevelWait = buildingLevelDelay;
			} else {
				buildLocs = [{x: lastLevelCoords.x, y: lastLevelCoords.y}]
				buildingLevel = true;
				buildingLevelTime = time;
				
				let cursor = gameObjects.find((obj) => (obj.type === "CURSOR"));
				let level = gameObjects.find((obj) => (obj.type === "LEVEL" && obj.name === lastLevel));
				if (cursor && level) {
					cursor.x = level.x;
					cursor.y = level.y;
					document.getElementById('header').innerHTML = (level.name in worldNumbers ? (Object.keys(worldNumbers).indexOf(level.name) + 1) + ". " : "") + level.name;
				}
			}
		}
		
		sparkle = false;
		if (time - lastSparkleTime > sparkleTime) {
			lastSparkleTime = time;
			sparkleTime = maxSparkleInterval * Math.random();
			sparkle = true;
		}
		if (!levelComplete) {
			let hots = gameObjects.filter((obj) => (is(obj, "HOT")));
			if (hots.length > 0) {
				while (hotCountdowns.length < hots.length) {
					hotCountdowns.push(Math.random());
				}
				for (i = 0; i < hotCountdowns.length; i++) {
					hotCountdowns[i] -= 0.001;
					if (hotCountdowns[i] < 0) {
						hotCountdowns[i] += Math.random();
						let steaming = hots[i];
						particles.push({type: "steam", x: steaming.x, y: steaming.y, dirbypi: 2*Math.random(), time: 900, speed: 1.5, created: t, color: 1, xshift: Math.random() - 0.5, yshift: Math.random() - 0.5});
					}
				}
			}
			if (sparkle) {
				gameObjects.filter((obj) => (is(obj, "WIN"))).forEach((obj) => {particles.push({type: "sparkle", x: obj.x, y: obj.y, dirbypi: 2*Math.random(), time: 900, speed: 1.5, created: t, color: 14, xshift: Math.random() - 0.5, yshift: Math.random() - 0.5});});
			}
		}
		
		if (buildingLevel) {
			if (time > buildingLevelTime + buildingLevelWait) {
				buildLocs.filter((loc) => loc && typeof loc.x === "number" && typeof loc.y === "number").forEach((loc) => {if (currentWorld != "Map" || loc.x != 15 || loc.y != 14) {revealed.push({x: loc.x, y: loc.y});}})
				buildingLevelTime = time;
				let buildingLocs = buildLocs.filter((loc) => loc && typeof loc.x === "number" && typeof loc.y === "number");
				buildLocs = [];
				buildingLocs.forEach((loc) => {
					modifyMap(loc.x, loc.y, true);
				});
				connectTiles();
				buildingLevelWait = buildingLevelSpeed;
				if (buildLocs.length === 0) {buildingLevel = false; buildingLevelWait = buildingLevelDelay;}
			}
		}
		
		if (time - lastFrameTime > animationSpeed) {
			animationFrame++;
			lastFrameTime = time;
		}
		
		if (levelComplete && !transitioning) {
			transitioning = true;
			transitionDelay = !Worlds.includes(currentLevel) && !exit;
			levelTransitionTime = time;
			
			cloudColor = worldColors[currentWorld][1];
		}
		
		if (animatingS) {
			if (time - lastFrameTimeS > animationSpeedS) {
				animatingS = false;
			}
		} else {
			lastFrameTimeS = time
		}
		prog = time - lastFrameTimeS;
		t = time;
		
		drawScene();
		lastLevelComplete = levelComplete
		if (transitioning) {
			levelTransitionProg = time - levelTransitionTime;
			if (levelComplete && transitionDelay) {levelTransitionProg -= phase1Duration;}
			realProg = levelTransitionProg / phase2Duration;
			if (realProg >= 0) {
				let next = false;
				if (realProg > 1) {
					if (levelComplete) {next = true; realProg = 1; musicGain.gain.value = 0;} else {transitioning = false; musicGain.gain.value = bgmVol; requestAnimationFrame(animate); return;}
				}
			
				const width = levelWidth;
				const height = levelHeight;
				
				const unit = canvas.width / width;
			
				const centerx = unit * width / 2;
				const centery = unit * height / 2;
			
				const radius = unit * (2 + Math.hypot(width, height) / 2); 
				
				const angles = [0.1,	0.15,	0.2,	0.25,	0.3,	0.35,	0.4,	0.45,	0.5	]
				const xradii = [1.5,	1,		1,		1.5,	2.5,	2.5,	2.5,	3,		4  	]
				const yradii = [2,		1.5,	1.5,	1.5,	1.5,	2,		1.5,	1,		2	]
				
				if (!levelComplete) {realProg = 1 - realProg;}
				
				musicGain.gain.value = (1 - realProg) * bgmVol;
				
				ctx.save();
				ctx.beginPath();
				ctx.rect(0, 0, canvas.width, canvas.height);
				ctx.ellipse(centerx, centery, (1 - realProg) * radius * width / height, (1 - realProg) * radius * height / width, 0, 0, 2 * Math.PI);
				ctx.fillStyle = cloudColor;
				ctx.fill("evenodd");
				ctx.restore();
			
				for (i = 0; i < angles.length; i++) {
					const x = radius * Math.cos(Math.PI * angles[i]) * (width / height)
					const y = radius * Math.sin(Math.PI * angles[i]) * (height / width)
					
					ctx.fillStyle = cloudColor;
					
					ctx.beginPath();
					ctx.ellipse((centerx + x) * (1 - realProg) + centerx * realProg, (centery + y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
					ctx.fill();
					ctx.beginPath();
					ctx.ellipse((centerx + x) * (1 - realProg) + centerx * realProg, (centery - y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
					ctx.fill();
					if (angles[i] != 0.5) {
						ctx.beginPath();
						ctx.ellipse((centerx - x) * (1 - realProg) + centerx * realProg, (centery + y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
						ctx.fill();
						ctx.beginPath();
						ctx.ellipse((centerx - x) * (1 - realProg) + centerx * realProg, (centery - y) * (1 - realProg) + centery * realProg, unit * xradii[i], unit * yradii[i], 0, 0, 2 * Math.PI);
						ctx.fill();
					}
				}
				if (next) {
					if (Worlds.includes(currentLevel)) {
						if (Worlds.includes(nextLevel)) {
							worldProgress[currentLevel] = gameProgress;
							bgColor = worldColors[nextLevel][0];
							document.body.style.backgroundColor = worldColors[nextLevel][1];
							palette = palettes[nextLevel]; 
							currentWorld = nextLevel; 
							loadSound('Overworld', 'Music/' + currentWorld + '.ogg');
							let areaCleared = (currentWorld === "Map" && gameProgress.length >= worldNumbers[currentLevel][0]);
							if (currentWorld in worldProgress) {gameProgress = worldProgress[currentWorld]; if (areaCleared) {exit = true;}} else {gameProgress = [];}
							if (areaCleared && !gameProgress.includes(currentLevel)) {gameProgress.push(currentLevel);} else {exit = true;}
						}
					} else if (!exit) {
						if (!gameProgress.includes(currentLevel)) {gameProgress.push(currentLevel);} else {exit = true;}
					}
					newLevel = true;
					lastLevel = currentLevel;
					currentLevel = nextLevel;
					levelComplete = false; 
					levelTransitionTime = time;
					buildingLevel = false;
					moves = 0;
					document.getElementById('header').innerHTML = "";
					if (currentLevel in worldNumbers) {document.getElementById('progress').innerHTML = gameProgress.length + '/' + worldNumbers[currentLevel][0];} else {document.getElementById('progress').innerHTML = ""}
					savedString = JSON.stringify({currentWorld: currentWorld, currentLevel: currentLevel, lastLevel: lastLevel, gameProgress: gameProgress, worldProgress: worldProgress})
					localStorage.setItem('save', savedString);
					initialize();
				}
			}
		}
		requestAnimationFrame(animate);
	}

	let levelComplete = false;
	let lastLevelComplete = false;
	let moves = 0;
	
	let moveTimes = 0;
	
	let moribund = [];
	let defeat = false;
	let walk = false;
	let unlock = false;
	
	function move(obj, dir, bounce = false) {
		let collDetect = true;
		let stillPushing = true;
		let keepPushing = true;
		let canMove = true;
		let unlocked = false;
		
		let collx = obj.x;
		let colly = obj.y;
		let pushObjs = [];
		
		while (collDetect) {
			collDetect = false;
			let open = gameObjects.find((open) => (is(open, "OPEN") && open.x === collx && open.y === colly));
			let shuts = gameObjects.filter((open) => (is(open, "SHUT") && open.x === collx && open.y === colly));
			switch(dir) {
				case 0:	collx += 1; break;
				case 1:	colly -= 1; break;
				case 2:	collx -= 1; break;
				case 3:	colly += 1; break;
			}
			if (open) {
				let openShuts = gameObjects.filter((shut) => (is(shut, "SHUT") && !is(shut, "YOU") && shut.x === collx && shut.y === colly && !moribund.includes(shut) && is(shut, "FLOAT") === is(open, "FLOAT")))
				if (openShuts.length > 0) {
					shuts = openShuts;
					unlocked = true;
				}
			} else if (shuts.length > 0) {
				let shutsOpen = gameObjects.find((shut) => (is(shut, "OPEN") && !is(shut, "YOU") && shut.x === collx && shut.y === colly))
				shuts = shuts.filter((shut) => (is(shutsOpen, "FLOAT") === is(shut, "FLOAT")));
				if (shutsOpen) {
					open = shutsOpen;
					unlocked = true;
				}
			}
			if (unlocked) {
				shuts.forEach((shut) => {if (!moribund.includes(shut)) {moribund.push(shut)}});
				if (!moribund.includes(open)) {moribund.push(open)}
				defeat = true;
				canMove = true;
				unlock = true;
				for (i = 0; i < 9; i++) {particles.push({type: "sparkle", x: open.x, y: open.y, dirbypi: 2 * Math.random(), time: 450, speed: 1, created: t, color: 14, xshift: Math.random() - 0.5, yshift: Math.random() - 0.5})}
				for (i = 0; i < 9; i++) {particles.push({type: "sparkle", x: collx, y: colly, dirbypi: 2 * Math.random(), time: 450, speed: 1, created: t, color: 14, xshift: Math.random() - 0.5, yshift: Math.random() - 0.5})}
				break;
			}
			if (gameObjects.some((stop) => (is(stop, "STOP") && !is(stop, "YOU") && !is(stop, "PUSH") && stop.x === collx && stop.y === colly)) || collx < 1 || colly < 1 || collx > levelWidth || colly > levelHeight) {canMove = false; break;}
			if (gameObjects.some((stop) => (is(stop, "STOP") && is(stop, "YOU") && stop.x === collx && stop.y === colly))) {collDetect = true; keepPushing = false;}
			gameObjects.filter((push) => (is(push, "YOU") && !stillPushing && push.x === collx && push.y === colly)).forEach((push) => {collDetect = true; keepPushing = false;});
			if (keepPushing) {gameObjects.filter((push) => (is(push, "PUSH") && push.x === collx && push.y === colly)).forEach((push) => {if (!is(push, "YOU")) {pushObjs.push(push); stillPushing = false;} collDetect = true;});}
		}
					
		obj.dir = dir;
		if (canMove) {
			pushObjs.forEach((pushObj) => {
				particles.push({type: "dust", x: pushObj.x, y: pushObj.y, dirbypi: (1 + (obj.dir * 0.5) % 2), time: 900, speed: 0.5, created: t, color: assetPositions[pushObj.type].color[pushObj.text + pushObj.active], xshift: 0, yshift: 0});
				switch(dir) {
					case 0:	pushObj.x += 1; break;
					case 1:	pushObj.y -= 1; break;
					case 2:	pushObj.x -= 1; break;
					case 3:	pushObj.y += 1; break;
				}
				pushObj.dir = dir;
				if (assetPositions[pushObj.type].sheet === spritesheets.characters) {pushObj.state = ((pushObj.state) % 4) + (4 * pushObj.dir);}
			})
			particles.push({type: "dust", x: obj.x, y: obj.y, dirbypi: (1 + (obj.dir * 0.5) % 2), time: 900, speed: 0.5, created: t, color: assetPositions[obj.type].color[obj.text + obj.active], xshift: 0, yshift: 0});
			switch(dir) {
				case 0:	obj.x += 1; break;
				case 1:	obj.y -= 1; break;
				case 2:	obj.x -= 1; break;
				case 3:	obj.y += 1; break;
			}
		} else if (bounce && moveTimes === 0) {
			moveTimes++;
			move(obj, (obj.dir + 2) % 4)
		}
		if (assetPositions[obj.type].sheet === spritesheets.characters) {obj.state = ((obj.state + 1) % 4) + (4 * obj.dir);}
		moveTimes = 0;
		return canMove;
	}

	// Listen for window resize
	window.addEventListener('resize', resizeCanvas);

	window.addEventListener('keydown', function(event) {
		lastyou = you;
		if (prog != 0 || levelComplete) return; // Ignore auto-repeats and when animating smooth movement
		if (event.key === "Escape" && !Worlds.includes(currentLevel)) {
			levelComplete = true;
			exit = true;
			nextLevel = currentWorld;
		}
		if (event.key === "r") {
			levelComplete = true;
			exit = true;
			nextLevel = currentLevel;
		}
		
		gameObjects.forEach((obj) => {
			obj.lastx = obj.x;
			obj.lasty = obj.y;
			if ((event.code.startsWith("Arrow") || event.code === "Space") && gameObjects.some((obj) => is(obj, "YOU") || is(obj, "MOVE"))) {
				obj.hist.push({type: obj.type, x: obj.x, y: obj.y, dir: obj.dir, state: obj.state});
			}
		})
		
		if ((event.code.startsWith("Arrow") || event.code === "Space") && gameObjects.some((obj) => is(obj, "YOU") || is(obj, "MOVE"))) {moves++; inactives.push([]);}
		if (event.code.startsWith("Arrow") || event.code === "Space") {
			gameObjects.forEach((obj) => {
				if (is(obj, "MOVE")) {
					for (i = 0; i < eqs[obj.type].filter((prop) => (prop === "MOVE")).length; i++) {
						walk = move(obj, obj.dir, true);
					}
					animatingS = true;
				}
			});
		}
		for (const obj of gameObjects) {
			if (event.code != "KeyZ") {
				if (event.code.startsWith("Arrow")) {
					if (is(obj, "YOU")) {
						let youDir;
						switch(event.code) {
							case 'ArrowRight':	youDir = 0; break;
							case 'ArrowUp':		youDir = 1; break;
							case 'ArrowLeft':	youDir = 2; break;
							case 'ArrowDown':	youDir = 3; break;
						}
						walk = move(obj, youDir);
						animatingS = true;
					}
					if (obj.type === "CURSOR") {
						walk = true;
						let newx = obj.x;
						let newy = obj.y;
						switch(event.code) {
								case 'ArrowRight':	newx += 1; break;
								case 'ArrowUp':		newy -= 1; break;
								case 'ArrowLeft':	newx -= 1; break;
								case 'ArrowDown':	newy += 1; break;
						}
						if (revealed.find((rvd) => (rvd.x === newx && rvd.y === newy))) {
							obj.x = newx;
							obj.y = newy;
							animatingS = true;
							newLvl = gameObjects.find((obj) => (obj.type === "LEVEL" && obj.x === newx && obj.y === newy))
							document.getElementById('header').innerHTML = newLvl ? (newLvl.name in worldNumbers ? (Object.keys(worldNumbers).indexOf(newLvl.name) + 1) + ". " : "") + newLvl.name : "";
						}
					}
				} else if (event.code === "Space") {
					let lvl = gameObjects.find((lvl) => (lvl.type === "LEVEL" && lvl.x === obj.x && lvl.y === obj.y))
					if (obj.type === "CURSOR" && lvl) {
						levelComplete = true;
						exit = false;
						nextLevel = lvl.name;
					}
				}
			}
		}
		if (walk) {playSFX('walk', 2);}
		walk = false;
		if (moves > 0) {
			if (event.key === "z") {
				inactives.pop().forEach((revived) => {gameObjects.push(revived);});
				for (const obj of gameObjects) {
					last = obj.hist.pop();
					if (last === 0) {
						gameObjects.splice(gameObjects.indexOf(obj), 1);
					}			
					obj.type = last.type;
					obj.x = last.x;
					obj.y = last.y;
					obj.dir = last.dir;
					obj.state = last.state;
				}
				animatingS = true;
				moves--;
				parseText(false);
			} else {
				parseText();
			}
		}
		checkWin();
		
		gameObjects.filter((unlock) => (is(unlock, "OPEN") && is(unlock, "SHUT"))).forEach((unlocked) => {
            if (!moribund.includes(unlocked)) { moribund.push(unlocked) }
				defeat = true;
				unlock = true;
				for (i = 0; i < 9; i++) {particles.push({type: "sparkle", x: unlocked.x, y: unlocked.y, dirbypi: 2 * Math.random(), time: 450, speed: 1, created: t, color: 14, xshift: Math.random() - 0.5, yshift: Math.random() - 0.5});}
        });
		gameObjects.filter((sink) => (is(sink, "SINK"))).forEach((sink) => {
			let sinking = gameObjects.filter((sinking) => (sinking != sink && sink.x === sinking.x && sink.y === sinking.y && is(sink, "FLOAT") === is(sinking, "FLOAT")))
			if (sinking.length > 0) {
				sinking.forEach((sunk) => { if (!moribund.includes(sunk)) { moribund.push(sunk) } });
				if (!moribund.includes(sink)) { moribund.push(sink) }
				defeat = true;
				for (let i = 0; i < 12; i++) { particles.push({ type: "drops", x: sink.x, y: sink.y, dirbypi: 2 * Math.random(), time: 450, speed: 1, created: t, color: assetPositions[sink.type].color[0], xshift: Math.random() - 0.5, yshift: Math.random() - 0.5}); }
			}
		});
        gameObjects.filter((defeat) => (is(defeat, "DEFEAT"))).forEach((defeater) => {
            let defeated = gameObjects.filter((defeated) => (is(defeated, "YOU") && defeater.x === defeated.x && defeater.y === defeated.y && is(defeater, "FLOAT") === is(defeated, "FLOAT")))
            if (defeated.length > 0) {
                defeated.forEach((defeated) => {
					if (!moribund.includes(defeated)) { moribund.push(defeated) }
					for (let i = 0; i < 5; i++) { particles.push({ type: "drops", x: defeater.x, y: defeater.y, dirbypi: 2 * Math.random(), time: 450, speed: 1, created: t, color: assetPositions[defeated.type].color[0], xshift: Math.random() - 0.5, yshift: Math.random() - 0.5}); }
				});
				defeat = true;
            }
        });
		gameObjects.filter((hot) => (is(hot, "HOT"))).forEach((hot) => {
            let melt = gameObjects.filter((melt) => (is(melt, "MELT") && hot.x === melt.x && hot.y === melt.y && is(hot, "FLOAT") === is(melt, "FLOAT")))
            if (melt.length > 0) {
                melt.forEach((melt) => { if (!moribund.includes(melt)) { moribund.push(melt) } });
				defeat = true;
				for (let i = 0; i < 12; i++) { particles.push({ type: "drops", x: hot.x, y: hot.y, dirbypi: 2 * Math.random(), time: 450, speed: 1, created: t, color: assetPositions[hot.type].color[0], xshift: Math.random() - 0.5, yshift: Math.random() - 0.5}); }
            }
        });
		
		if (defeat) {if (unlock) {playSFX('unlock')} else {playSFX('defeat');} moribund.forEach((removed) => { del(removed); })}
		moribund = [];
		defeat = false;
		unlock = false;
		
		you = gameObjects.some((obj) => (is(obj, "YOU"))) || Worlds.includes(currentLevel);
		if (!you && lastyou) {
			silenceSound = playSFX('silence', 0.5, true);
			musicGain.gain.value = 0;
		} else if (you && !lastyou && silenceSound) {
			silenceSound.stop();
			musicGain.gain.value = bgmVol;
		}
		if (event.key != "z") {connectTiles();}
	});
});
</script>
