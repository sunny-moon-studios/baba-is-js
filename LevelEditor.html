const levelIcons = {"JELLY": 0, "DOT": 14};

let levelWidth = parseInt(prompt("Width of level?"));

let text = false;

// Colors are taken in top-to-bottom, left-to-right order from spritesheetColors.png
palette = palettes["The Lake"]

let gameObjects = [];

const colorizedSpriteCache = {};

// Colorize a sprite (multiply blend) and cache it
function getColorizedSprite(asset, frameIndex, spriteState, color, particle = false) { 
	const sheet = asset.sheet;
	if (!sheet.complete || !sheet.naturalWidth) {
		// Sheet not loaded yet, skip drawing to avoid colored blocks
		return null;
	}
	
	const cacheKey = asset.type + "_" + frameIndex + "_" + spriteState + "_" + color;
	if (colorizedSpriteCache[cacheKey]) {
		return colorizedSpriteCache[cacheKey];
	}
	
	const sheetName = Object.keys(spritesheets).find(key => spritesheets[key] === asset.sheet);
	
	const cursor = asset.type === "CURSOR";
	const spriteSize = particle ? particleData[asset.type].size : (cursor ? cursorSize : size);

	// Create offscreen canvas
	const offCanvas = document.createElement('canvas');
	offCanvas.width = spriteSize;
	offCanvas.height = spriteSize;
	const offCtx = offCanvas.getContext('2d');
	
	if (cursor) {spriteState = frameIndex; frameIndex = 0;}
	// 1. Draw the grayscale sprite
	offCtx.clearRect(0, 0, spriteSize, spriteSize);
	offCtx.drawImage(
		asset.sheet,
		asset.col + (spriteSize + 1) * spriteState, asset.row + (spriteSize + 1) * frameIndex,
		spriteSize, spriteSize,
		0, 0, spriteSize, spriteSize
	);

	// 2. Multiply blend with color
	offCtx.globalCompositeOperation = 'multiply';
	offCtx.fillStyle = color;
	offCtx.fillRect(0, 0, spriteSize, spriteSize);

	// 3. Keep alpha
	offCtx.globalCompositeOperation = 'destination-in';
	offCtx.drawImage(
		asset.sheet,
		asset.col + (spriteSize + 1) * spriteState, asset.row + (spriteSize + 1) * frameIndex,
		spriteSize, spriteSize,
		0, 0, spriteSize, spriteSize
	);

	// Restore
	offCtx.globalCompositeOperation = 'source-over';

	colorizedSpriteCache[cacheKey] = offCanvas;
	return offCanvas;
}

function connectTiles() {
	gameObjects.forEach((obj) => {
		if (assetPositions[obj.type].sheet === spritesheets.tiles) {
			obj.state = 0
			if (obj.x === levelWidth || gameObjects.some((oth) => (!oth.text && oth.type === obj.type && oth.x === obj.x + 1 && oth.y === obj.y))) {
				obj.state += 1
			}
			if (obj.y === 1 || gameObjects.some((oth) => (!oth.text && oth.type === obj.type && oth.y === obj.y - 1 && oth.x === obj.x))) {
				obj.state += 2
			}
			if (obj.x === 1 || gameObjects.some((oth) => (!oth.text && oth.type === obj.type && oth.x === obj.x - 1 && oth.y === obj.y))) {
				obj.state += 4
			}
			if (obj.y === levelHeight || gameObjects.some((oth) => (!oth.text && oth.type === obj.type && oth.y === obj.y + 1 && oth.x === obj.x))) {
				obj.state += 8
			}
		} else if (assetPositions[obj.type].sheet === spritesheets.characters) {
			obj.state = 4 * obj.dir
		} else if (assetPositions[obj.type].sheet === spritesheets.others) {
			obj.state = obj.dir;
		} else {obj.state = 0;}
	});
}

function drawAsset(ctx, assetName, x, y, frameIndex = 0, spriteState = 0, color, particle = false) {
	const asset = assetPositions[assetName];
	const unitX = canvas.width / levelWidth
	const unitY = canvas.height / levelHeight
	
	const colorized = getColorizedSprite(
			{...asset, type: assetName}, // asset, with type info
			frameIndex,
			spriteState,
			color,
			particle
	);
	if (particle) {
		let xshift = particleData[assetName].xshift;
		let yshift = particleData[assetName].yshift;
		ctx.drawImage(
			colorized,
			0, 0, particleData[assetName].size, particleData[assetName].size,
			(x - 1 + xshift) * unitX, (y - 1 + yshift) * unitY,
			unitX * (particleData[assetName].size / size), unitY * (particleData[assetName].size / size)
		);
	} else {
		if (assetName === "CURSOR") {
			ctx.drawImage(
				colorized,
				0, 0, cursorSize, cursorSize,
				(x - 1 - (cursorSize / size - 1) / 2) * unitX, (y - 1  - (cursorSize / size - 1) / 2) * unitY,
				unitX * cursorSize / size, unitY * cursorSize / size
			);
		} else {
			ctx.drawImage(
				colorized,
				0, 0, size, size,
				(x - 1) * unitX, (y - 1) * unitY,
				unitX, unitY
			);
		}
	}
}

var everythingLoaded = false

function loadSpritesheets(callback) {
	if (everythingLoaded === true) {
		callback();
		return;
	}
	let loaded = 0;
	const total = Object.keys(spritesheets).length;
	if (total === 0) {
		everythingLoaded = true;
		callback();
		return;
	}
	for (const key in spritesheets) {
		const img = spritesheets[key];
		// If the image is already loaded (from cache), count it immediately
		if (img.complete) {
			loaded++;
			if (loaded === total) {
				everythingLoaded = true;
				callback();
			}
		} else {
			img.onload = () => {
				loaded++;
				if (loaded === total) {
					everythingLoaded = true;
					callback();
				}
			};
		}
	}
}

function drawScene() {
	const unitX = canvas.width / levelWidth
	const unitY = canvas.height / levelHeight
	
	ctx.fillStyle = bgColor;
	ctx.fillRect(0, 0, canvas.width, canvas.height);
	
	ctx.fillStyle = "#FF0000";
	ctx.fillRect((cursorX-1) * unitX, (cursorY-1) * unitY, unitX, unitY);
	
	// Draw each game object and particle
	for (const obj of gameObjects) {
		drawAsset(
			ctx, obj.type,
			obj.x,
			obj.y,
			(animationFrame + obj.frameSeed) % 3,
			obj.text ? -1 : obj.state,
			obj.type === "LEVEL" ? palette[lvlColor] : palette[assetPositions[obj.type].color[obj.text + obj.active]]);
	}
}

let animationStarted = false;
// Function to resize canvas to window size
function resizeCanvas() {
	marginSize = 88
	aspectRatio = levelWidth / levelHeight
	canvas.height = ((window.innerHeight - marginSize) * aspectRatio > window.innerWidth - marginSize) ? (window.innerWidth - marginSize) / aspectRatio: window.innerHeight - marginSize;
	canvas.width = canvas.height * aspectRatio;
	if (window.innerHeight < marginSize) {
		canvas.height = ((window.innerHeight) * aspectRatio > window.innerWidth) ? (window.innerWidth) / aspectRatio: window.innerHeight;
		canvas.width = canvas.height * aspectRatio;
	}
	loadSpritesheets(() => {
		ctx.imageSmoothingEnabled = false;
		drawScene();
		if (!animationStarted) {
			animationStarted = true;
			requestAnimationFrame(animate);
		}
	});
}

const animationSpeed = 150; // ms per frame
let animationFrame = 0;
let lastFrameTime = 0;

function animate(time) {
	if (time - lastFrameTime > animationSpeed) {
		animationFrame++;
		lastFrameTime = time;
	}
	
	drawScene();
	requestAnimationFrame(animate);
}

resizeCanvas();

// Listen for window resize
window.addEventListener('resize', resizeCanvas);

window.addEventListener('keydown', function(event) {
	let prospectX = cursorX;
	let prospectY = cursorY;
	switch(event.code) {
			case 'KeyD':		{prospectX += 1;} 	break;
			case 'KeyW':		{prospectY -= 1;} break;
			case 'KeyA':		{prospectX -= 1;} break;
			case 'KeyS':		{prospectY += 1;} break;
			case 'ArrowRight':	{dir = 0;} break;
			case 'ArrowUp':		{dir = 1;} break;
			case 'ArrowLeft':	{dir = 2;} break;
			case 'ArrowDown':	{dir = 3;} break;
			case 'Space':		{let newObj = gameObjects.push({ type: type, x: cursorX, y: cursorY, text: text, active: text, dir: dir, state: state, frameSeed: Math.floor(Math.random() * 3), color: lvlColor, icon: lvlIcon, name: lvlName});} break;
			case 'KeyT':		{text = !text;} break;
			case 'KeyN':		{type = prompt("What kind of object do you want?").toUpperCase(); if (type === "LEVEL") {lvlColor = prompt("You chose \"LEVEL\", which colour number do you want?"); lvlIcon = prompt("And what will your icon be?").toUpperCase(); lvlName = prompt("And the name?")}} break;
			case 'KeyB':		{let worldColor = prompt("Which colour scheme do you want?"); if (worldColor in worldColors) { bgColor = worldColors[worldColor][0]; document.body.style.backgroundColor = worldColors[worldColor][1]; palette = palettes[worldColor];} } break;
			case 'KeyZ':		{gameObjects.pop();} break;
			case 'KeyP':		{
				let json = "{\"width\":" + levelWidth + ",\"height\":" + levelHeight + ",\"objects\":[";
				let comma = false;
				gameObjects.forEach((obj) => {
					dirSymbol = "";
					switch (obj.dir) {
						case 1: dirSymbol = "<"; break;
						case 2: dirSymbol = "="; break;
						case 3: dirSymbol = ">"; break;
					}
					typeText = obj.type;
					if (comma) {json += ","}
					if (obj.text) {typeText = typeText.toLowerCase();}
					objData = "{\"type\":\"" + dirSymbol + typeText + "\",\"x\":" + obj.x + ",\"y\":" + obj.y;
					if (obj.type === "LEVEL") {objData += ",\"color\":" + obj.color + ",\"icon\":\"" + obj.icon + "\",\"name\":\"" + obj.name + "\""}
					objData += "}";
					json += objData;
					comma = true;
				});
				json += "]}";
				
				const blob = new Blob([json], { type: 'application/json' });
				const url = URL.createObjectURL(blob);

				const a = document.createElement('a');
				a.href = url;
				a.download = prompt("What will the name of your level be?") + '.json';
				a.click();

				URL.revokeObjectURL(url); // Clean up
				
			} break;
	}
	if (prospectX > 0 && prospectX <= levelWidth && prospectY > 0 && prospectY <= levelHeight) {
		cursorX = prospectX;
		cursorY = prospectY;
	}
	resizeCanvas();
	connectTiles();
});
